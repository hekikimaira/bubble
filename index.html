<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吹き出しツール</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f1a;
    --panel: #1a1a2e;
    --border: #2a2a4a;
    --accent: #38bdf8;
    --text: #e2e8f0;
    --dim: #94a3b8;
    --purple: #6366f1;
    --amber: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
  }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    font-weight: 600;
  }
  button:disabled { opacity: 0.4; cursor: default; }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .toolbar .sep { width: 1px; height: 24px; background: var(--border); }
  .btn {
    padding: 6px 14px;
    color: #fff;
    border-radius: 6px;
    font-size: 13px;
    white-space: nowrap;
    transition: filter 0.15s;
  }
  .btn:hover:not(:disabled) { filter: brightness(1.2); }
  .btn-accent { background: var(--accent); }
  .btn-purple { background: var(--purple); }
  .btn-amber { background: var(--amber); color: #000; }
  .btn-green { background: var(--green); }
  .btn-red { background: var(--red); }
  .btn-small {
    padding: 3px 8px;
    font-size: 11px;
    border-radius: 4px;
    color: #fff;
  }

  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #canvas-area {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  #drop-zone {
    width: 400px; height: 300px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; gap: 12px;
    transition: border-color 0.2s;
  }
  #drop-zone:hover { border-color: var(--accent); }
  #canvas-wrapper {
    position: relative;
    display: none;
    flex-shrink: 0;
    transform-origin: center center;
  }
  #canvas-wrapper img {
    display: block;
    pointer-events: none;
  }
  .bubble {
    position: absolute;
    writing-mode: vertical-rl;
    display: inline-flex;
    flex-direction: row-reverse;
    cursor: move;
    user-select: none;
    transition: outline 0.15s;
    outline: 2px solid transparent;
    outline-offset: 2px;
  }
  .bubble.selected { outline: 2px solid var(--accent); z-index: 10; }
  .bubble-col {
    white-space: nowrap;
    line-height: 1.4;
  }

  /* Right panel */
  #panel {
    width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #editor { flex: 1; overflow: auto; padding: 12px; }
  #placeholder-msg {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; color: var(--dim); text-align: center; gap: 8px;
  }
  .lbl {
    font-size: 11px; font-weight: 600; color: var(--dim);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 4px; display: block;
  }
  textarea, input[type="number"] {
    width: 100%; padding: 8px 10px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-size: 14px; outline: none;
    font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  }
  textarea { resize: vertical; }
  input[type="range"] { accent-color: var(--accent); width: 100%; }
  .color-swatch {
    width: 28px; height: 28px; border-radius: 4px;
    cursor: pointer; border: 2px solid transparent;
    position: relative; overflow: hidden;
  }
  .color-swatch.active { border-color: var(--accent); }
  .color-swatch-inner {
    position: absolute; inset: 0; border-radius: 3px;
  }
  .color-swatch-checker {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(45deg,#333 25%,transparent 25%,transparent 75%,#333 75%),
      linear-gradient(45deg,#333 25%,transparent 25%,transparent 75%,#333 75%);
    background-size: 8px 8px;
    background-position: 0 0, 4px 4px;
  }
  .preset-btn {
    padding: 3px 8px; border-radius: 4px;
    font-size: 12px; cursor: pointer;
    background: var(--border); color: var(--dim);
    border: none;
  }
  .preset-btn.active { background: var(--amber); color: #000; }
  .type-btn {
    flex: 1; padding: 6px 0; border-radius: 6px;
    font-size: 13px; font-weight: 600;
    background: var(--border); color: var(--dim);
  }
  .type-btn.active { background: var(--accent); color: #000; }

  /* Bubble list */
  #bubble-list { border-top: 1px solid var(--border); max-height: 200px; overflow: auto; }
  .list-header {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--dim); padding: 8px 12px 4px;
  }
  .list-item {
    padding: 6px 12px; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    border-left: 3px solid transparent;
  }
  .list-item.active { background: var(--border); border-left-color: var(--accent); }
  .list-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .list-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .zoom-group { display: flex; align-items: center; gap: 4px; font-size: 13px; }
  .zoom-group span { color: var(--dim); }
</style>
</head>
<body>

<div id="main">
  <div class="toolbar">
    <input type="file" id="file-input" accept="image/*" style="display:none">
    <button class="btn btn-accent" onclick="document.getElementById('file-input').click()">画像読込</button>
    <div class="sep"></div>
    <button class="btn btn-purple" id="btn-add-dialogue" disabled onclick="addBubble('dialogue')">+ セリフ</button>
    <button class="btn btn-amber" id="btn-add-onom" disabled onclick="addBubble('onomatopoeia')">+ オノマトペ</button>
    <div style="flex:1"></div>
    <div class="zoom-group">
      <span>Zoom</span>
      <input type="range" id="zoom-slider" min="0.1" max="2" step="0.05" value="1" style="width:80px" oninput="setZoom(this.value)">
      <span id="zoom-label" style="width:40px;text-align:right">100%</span>
    </div>
    <div class="sep"></div>
    <button class="btn btn-green" id="btn-png" disabled onclick="exportImage('png')">PNG出力</button>
    <button class="btn btn-green" id="btn-jpeg" disabled onclick="exportImage('jpeg')">JPEG出力</button>
  </div>
  <div id="canvas-area">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span style="color:var(--dim);font-size:14px">画像をドロップまたはクリック</span>
    </div>
    <div id="canvas-wrapper">
      <img id="canvas-img" src="" alt="">
    </div>
  </div>
</div>

<div id="panel">
  <div id="editor" style="display:none"></div>
  <div id="placeholder-msg">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <span style="font-size:13px">吹き出しを選択して編集</span>
    <span style="font-size:11px">ツールバーから追加できます</span>
  </div>
  <div id="bubble-list">
    <div class="list-header">吹き出し一覧 (<span id="bubble-count">0</span>)</div>
    <div id="list-items"></div>
  </div>
</div>

<script>
const TYPES = {
  dialogue: {
    label: "セリフ", bg: "rgba(0,0,0,0.65)", color: "#ffffff",
    fontSize: 28, radius: 12, padding: 16, weight: "normal", spacing: 4, stroke: false
  },
  onomatopoeia: {
    label: "オノマトペ", bg: "rgba(0,0,0,0.45)", color: "#ffffff",
    fontSize: 42, radius: 8, padding: 12, weight: "bold", spacing: 8, stroke: true
  }
};

const BG_COLORS = [
  "rgba(0,0,0,0.65)","rgba(0,0,0,0.45)","rgba(0,0,0,0.8)",
  "rgba(30,30,60,0.7)","rgba(60,20,20,0.65)","rgba(20,40,60,0.7)","rgba(255,255,255,0.6)"
];
const TEXT_COLORS = ["#ffffff","#f0e68c","#fca5a5","#93c5fd","#86efac","#c4b5fd"];
const ONOM_PRESETS = [
  "ドキッ","ゾクッ","ビクッ","じーっ","ぎゅっ",
  "はぁ…","カァァ","ゴクリ","トクン","ぞわっ",
  "きゅん","ドキドキ","ぐっ…","チラッ","ふるっ"
];

let imageData = null;
let imageW = 0, imageH = 0;
let bubbles = [];
let selectedId = null;
let currentZoom = 1;
let idCounter = 0;

const $ = (s) => document.querySelector(s);
const fileInput = $('#file-input');
const dropZone = $('#drop-zone');
const wrapper = $('#canvas-wrapper');
const canvasImg = $('#canvas-img');

fileInput.addEventListener('change', (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      imageW = img.width; imageH = img.height;
      imageData = ev.target.result;
      canvasImg.src = imageData;
      canvasImg.style.width = imageW + 'px';
      canvasImg.style.height = imageH + 'px';
      wrapper.style.width = imageW + 'px';
      wrapper.style.height = imageH + 'px';
      wrapper.style.display = 'block';
      dropZone.style.display = 'none';
      bubbles = []; selectedId = null;
      clearBubbleDom();
      fitZoom();
      enableButtons(true);
      renderList();
      renderEditor();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

wrapper.addEventListener('click', (e) => {
  if (e.target === wrapper || e.target === canvasImg) {
    selectedId = null;
    document.querySelectorAll('.bubble').forEach(b => b.classList.remove('selected'));
    renderEditor();
    renderList();
  }
});

// Drag & drop image
document.body.addEventListener('dragover', (e) => { e.preventDefault(); });
document.body.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer?.files?.[0];
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
    fileInput.dispatchEvent(new Event('change'));
  }
});

function enableButtons(v) {
  $('#btn-add-dialogue').disabled = !v;
  $('#btn-add-onom').disabled = !v;
  $('#btn-png').disabled = !v;
  $('#btn-jpeg').disabled = !v;
}

function fitZoom() {
  const area = $('#canvas-area');
  const cw = area.clientWidth - 32;
  const ch = area.clientHeight - 32;
  const z = Math.min(cw / imageW, ch / imageH, 1);
  setZoom(z);
  $('#zoom-slider').value = z;
}

function setZoom(v) {
  currentZoom = parseFloat(v);
  wrapper.style.transform = `scale(${currentZoom})`;
  $('#zoom-label').textContent = Math.round(currentZoom * 100) + '%';
}

function genId() { return 'b' + (++idCounter); }

function addBubble(type) {
  const s = TYPES[type];
  const b = {
    id: genId(), type,
    text: type === 'onomatopoeia' ? 'ドキッ' : 'セリフを入力',
    x: 50 + Math.random()*100, y: 50 + Math.random()*100,
    fontSize: s.fontSize, bg: s.bg, color: s.color
  };
  bubbles.push(b);
  createBubbleDom(b);
  selectBubble(b.id);
}

function createBubbleDom(b) {
  const el = document.createElement('div');
  el.className = 'bubble';
  el.id = 'bub-' + b.id;
  el.dataset.bid = b.id;
  updateBubbleDom(b, el);
  makeDraggable(el, b);
  el.addEventListener('mousedown', (e) => { e.stopPropagation(); selectBubble(b.id); });
  el.addEventListener('touchstart', (e) => { e.stopPropagation(); selectBubble(b.id); }, {passive: true});
  wrapper.appendChild(el);
}

function updateBubbleDom(b, el) {
  if (!el) el = document.getElementById('bub-' + b.id);
  if (!el) return;
  const s = TYPES[b.type];
  const isO = b.type === 'onomatopoeia';
  el.style.left = b.x + 'px';
  el.style.top = b.y + 'px';
  el.style.backgroundColor = b.bg;
  el.style.borderRadius = s.radius + 'px';
  el.style.padding = s.padding + 'px';
  el.style.gap = isO ? '2px' : '6px';

  const lines = b.text.split('\n');
  el.innerHTML = '';
  lines.forEach(line => {
    const span = document.createElement('span');
    span.className = 'bubble-col';
    span.textContent = line;
    span.style.color = b.color;
    span.style.fontSize = b.fontSize + 'px';
    span.style.fontWeight = s.weight;
    span.style.letterSpacing = s.spacing + 'px';
    span.style.textShadow = isO
      ? '0 0 8px rgba(0,0,0,0.8), 2px 2px 0 rgba(0,0,0,0.6)'
      : '0 1px 3px rgba(0,0,0,0.5)';
    if (isO) span.style.webkitTextStroke = '1px rgba(0,0,0,0.3)';
    el.appendChild(span);
  });
}

function makeDraggable(el, b) {
  let startX, startY, origX, origY;

  el.addEventListener('mousedown', (e) => {
    startX = e.clientX; startY = e.clientY;
    origX = b.x; origY = b.y;
    const onMove = (ev) => {
      b.x = origX + (ev.clientX - startX) / currentZoom;
      b.y = origY + (ev.clientY - startY) / currentZoom;
      el.style.left = b.x + 'px';
      el.style.top = b.y + 'px';
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      renderEditor();
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  el.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    origX = b.x; origY = b.y;
    const onMove = (ev) => {
      ev.preventDefault();
      const tc = ev.touches[0];
      b.x = origX + (tc.clientX - startX) / currentZoom;
      b.y = origY + (tc.clientY - startY) / currentZoom;
      el.style.left = b.x + 'px';
      el.style.top = b.y + 'px';
    };
    const onEnd = () => {
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onEnd);
      renderEditor();
    };
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);
  }, {passive: true});
}

function selectBubble(id) {
  selectedId = id;
  document.querySelectorAll('.bubble').forEach(b => {
    b.classList.toggle('selected', b.dataset.bid === id);
  });
  renderEditor();
  renderList();
}

function deleteBubble(id) {
  const el = document.getElementById('bub-' + id);
  if (el) el.remove();
  bubbles = bubbles.filter(b => b.id !== id);
  selectedId = null;
  renderEditor();
  renderList();
}

function duplicateBubble(id) {
  const src = bubbles.find(b => b.id === id);
  if (!src) return;
  const nb = { ...src, id: genId(), x: src.x + 30, y: src.y + 30 };
  bubbles.push(nb);
  createBubbleDom(nb);
  selectBubble(nb.id);
}

function clearBubbleDom() {
  document.querySelectorAll('.bubble').forEach(e => e.remove());
}

function getSelected() { return bubbles.find(b => b.id === selectedId); }

function renderEditor() {
  const editor = $('#editor');
  const ph = $('#placeholder-msg');
  const b = getSelected();
  if (!b) {
    editor.style.display = 'none';
    ph.style.display = 'flex';
    return;
  }
  ph.style.display = 'none';
  editor.style.display = 'block';

  const isO = b.type === 'onomatopoeia';
  const s = TYPES[b.type];

  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim)">${s.label}</span>
      <div style="display:flex;gap:4px">
        <button class="btn-small" style="background:var(--purple)" onclick="duplicateBubble('${b.id}')">複製</button>
        <button class="btn-small" style="background:var(--red)" onclick="deleteBubble('${b.id}')">✕</button>
      </div>
    </div>

    <label class="lbl">テキスト</label>
    <textarea id="ed-text" rows="4" placeholder="改行で列分割" oninput="updateField('text',this.value)">${escapeHtml(b.text)}</textarea>
    <div style="font-size:11px;color:var(--dim);margin:2px 0 8px">改行 = 新しい列（縦書き）</div>
  `;

  if (isO) {
    html += `<label class="lbl">プリセット</label><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">`;
    ONOM_PRESETS.forEach(p => {
      html += `<button class="preset-btn ${b.text===p?'active':''}" onclick="updateField('text','${p}');renderEditor()">${p}</button>`;
    });
    html += `</div>`;
  }

  html += `
    <label class="lbl">フォントサイズ: ${b.fontSize}px</label>
    <input type="range" min="12" max="80" value="${b.fontSize}" oninput="updateField('fontSize',+this.value)" style="margin-bottom:12px">

    <label class="lbl">背景色</label>
    <div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap">
  `;
  BG_COLORS.forEach(c => {
    html += `<div class="color-swatch ${b.bg===c?'active':''}" onclick="updateField('bg','${c}');renderEditor()">
      <div class="color-swatch-checker"></div>
      <div class="color-swatch-inner" style="background:${c}"></div>
    </div>`;
  });
  html += `</div>`;

  html += `<label class="lbl">文字色</label><div style="display:flex;gap:4px;margin-bottom:12px">`;
  TEXT_COLORS.forEach(c => {
    html += `<div class="color-swatch ${b.color===c?'active':''}" style="background:${c}" onclick="updateField('color','${c}');renderEditor()"></div>`;
  });
  html += `</div>`;

  html += `
    <label class="lbl">タイプ切替</label>
    <div style="display:flex;gap:4px;margin-bottom:12px">
      <button class="type-btn ${b.type==='dialogue'?'active':''}" onclick="switchType('dialogue')">セリフ</button>
      <button class="type-btn ${b.type==='onomatopoeia'?'active':''}" onclick="switchType('onomatopoeia')">オノマトペ</button>
    </div>

    <label class="lbl">位置 (x, y)</label>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <input type="number" value="${Math.round(b.x)}" oninput="updateField('x',+this.value)" style="width:50%">
      <input type="number" value="${Math.round(b.y)}" oninput="updateField('y',+this.value)" style="width:50%">
    </div>
  `;

  editor.innerHTML = html;
}

function updateField(key, val) {
  const b = getSelected();
  if (!b) return;
  b[key] = val;
  updateBubbleDom(b);
  if (key === 'text') renderList();
}

function switchType(type) {
  const b = getSelected();
  if (!b) return;
  b.type = type;
  b.fontSize = TYPES[type].fontSize;
  updateBubbleDom(b);
  renderEditor();
  renderList();
}

function renderList() {
  $('#bubble-count').textContent = bubbles.length;
  const container = $('#list-items');
  container.innerHTML = '';
  bubbles.forEach(b => {
    const div = document.createElement('div');
    div.className = 'list-item' + (b.id === selectedId ? ' active' : '');
    div.onclick = () => selectBubble(b.id);
    div.innerHTML = `
      <span class="list-dot" style="background:${b.type==='onomatopoeia'?'var(--amber)':'var(--purple)'}"></span>
      <span class="list-text">${escapeHtml(b.text.replace(/\n/g,' '))}</span>
    `;
    container.appendChild(div);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Export
async function exportImage(format) {
  if (!imageData) return;
  const canvas = document.createElement('canvas');
  canvas.width = imageW; canvas.height = imageH;
  const ctx = canvas.getContext('2d');

  const img = new Image();
  await new Promise(r => { img.onload = r; img.src = imageData; });
  ctx.drawImage(img, 0, 0);

  for (const b of bubbles) {
    const s = TYPES[b.type];
    const fs = b.fontSize;
    const isO = b.type === 'onomatopoeia';
    ctx.font = `${s.weight==='bold'?'bold ':''}${fs}px "Hiragino Kaku Gothic ProN", sans-serif`;

    const lines = b.text.split('\n');
    const lineH = fs * 1.4;
    const charHeights = lines.map(line => Math.max(line.length * fs * 1.2, fs));
    const maxH = Math.max(...charHeights);
    const totalW = lines.length * lineH;
    const pad = s.padding;

    // Background
    ctx.fillStyle = b.bg;
    roundRect(ctx, b.x, b.y, totalW + pad*2, maxH + pad*2, s.radius);
    ctx.fill();

    // Text
    ctx.fillStyle = b.color;
    ctx.font = `${s.weight==='bold'?'bold ':''}${fs}px "Hiragino Kaku Gothic ProN", sans-serif`;
    ctx.textBaseline = 'middle';

    lines.forEach((line, li) => {
      const colX = b.x + pad + (lines.length - 1 - li) * lineH + lineH / 2;
      let charY = b.y + pad + fs * 0.6;
      for (const ch of line) {
        if (isO) {
          ctx.strokeStyle = 'rgba(0,0,0,0.5)';
          ctx.lineWidth = 3;
          ctx.strokeText(ch, colX, charY);
        }
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = isO ? 6 : 3;
        ctx.fillText(ch, colX, charY);
        ctx.shadowBlur = 0;
        charY += fs * 1.2;
      }
    });
  }

  const mime = format === 'jpeg' ? 'image/jpeg' : 'image/png';
  const q = format === 'jpeg' ? 0.92 : undefined;
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bubble_output.${format}`;
    a.click();
    URL.revokeObjectURL(url);
  }, mime, q);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}
</script>
